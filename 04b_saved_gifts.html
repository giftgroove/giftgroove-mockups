<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiftGroove &mdash; Saved Gifts</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --white:#FFFFFF; --off-white:#F9F9F7; --gray-50:#F4F4F2; --gray-400:#9E9E96;
    --gray-600:#6B6B64; --gray-900:#1C1C1A; --red:#C0392B; --red-pale:#FDECEA;
    --green:#2D6A4F; --green-mid:#3A8B65; --green-pale:#EAF4EF;
    --gold:#D4941A; --gold-pale:#FEF7E6; --border:#E8E8E4;
    --sans:Arial,Helvetica,sans-serif; --serif:Georgia,'Times New Roman',serif;
  }
  body { background:var(--off-white); color:var(--gray-900); font-family:var(--sans); font-size:14px; line-height:1.5; margin:0; }
  .gg-icon { width:38px; height:38px; border-radius:10px; flex-shrink:0; background:linear-gradient(135deg,#C0392B 0%,#D4941A 100%); display:flex; align-items:center; justify-content:center; font-family:Arial,sans-serif; font-size:13px; font-weight:bold; color:#fff; letter-spacing:-1px; user-select:none; }
  .gg-icon-sm { width:30px; height:30px; border-radius:8px; flex-shrink:0; background:linear-gradient(135deg,#C0392B 0%,#D4941A 100%); display:flex; align-items:center; justify-content:center; font-family:Arial,sans-serif; font-size:11px; font-weight:bold; color:#fff; letter-spacing:-1px; user-select:none; }

  .desk-app { display:flex; height:100vh; overflow:hidden; }
  .sidebar { width:210px; min-width:210px; height:100%; background:var(--white); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; }
  .logo { padding:18px 20px 16px; border-bottom:1px solid var(--border); }
  .logo-wrap { display:flex; align-items:center; gap:10px; }
  .logo-name { font-family:var(--sans); font-size:17px; font-weight:bold; color:var(--red); }
  .logo-tag { font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--gray-400); margin-top:2px; }
  .nav { flex:1; padding:16px 0; }
  .nav-sec { font-size:9px; font-weight:bold; letter-spacing:0.18em; text-transform:uppercase; color:var(--gray-400); padding:0 20px; margin:14px 0 4px; }
  .nav-item { text-decoration:none; display:flex; align-items:center; gap:10px; padding:10px 20px; font-size:13px; color:var(--gray-600); border-left:3px solid transparent; transition:all 0.15s; }
  .nav-item:hover { color:var(--gray-900); background:var(--gray-50); }
  .nav-item.active { color:var(--green); background:var(--green-pale); border-left-color:var(--green); font-weight:bold; }
  .sid-foot { padding:16px 20px 20px; border-top:1px solid var(--border); }
  .uchip { display:flex; align-items:center; gap:9px; }
  .uavatar { width:32px; height:32px; border-radius:50%; background:var(--gold-pale); border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:bold; color:var(--gold); }
  .uname { font-size:12px; font-weight:bold; }
  .uplan { font-size:10px; color:var(--gray-400); }
  .logout-btn { margin-top:10px; width:100%; padding:7px; border:1px solid var(--border); border-radius:7px; background:transparent; font-family:var(--sans); font-size:11px; color:var(--gray-400); cursor:pointer; }
  .logout-btn:hover { border-color:var(--red); color:var(--red); background:var(--red-pale); }

  .main { flex:1; min-width:0; height:100%; overflow-y:auto; display:flex; flex-direction:column; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-bottom:1px solid var(--border); background:var(--white); flex-shrink:0; position:sticky; top:0; z-index:10; gap:12px; }
  .pg-title { font-family:var(--serif); font-size:22px; font-style:italic; color:var(--gray-900); }
  .tbar-count { font-size:13px; color:var(--gray-400); }
  .content { padding:24px 24px 48px; flex:1; }

  /* Filter tabs */
  .filter-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
  .filter-tabs { display:flex; gap:6px; }
  .ftab { padding:5px 14px; border-radius:20px; font-size:12px; font-weight:bold; cursor:pointer; border:1px solid var(--border); background:var(--white); color:var(--gray-600); transition:all 0.15s; }
  .ftab.active { background:var(--green); color:#fff; border-color:var(--green); }
  .ftab:hover:not(.active) { border-color:var(--green-mid); color:var(--green); }

  /* Contact groups */
  .contact-group { margin-bottom:28px; }
  .group-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; padding-bottom:8px; border-bottom:2px solid var(--border); }
  .group-color { width:5px; height:24px; border-radius:3px; flex-shrink:0; }
  .gc-0{background:var(--red);} .gc-1{background:var(--gold);} .gc-2{background:var(--green-mid);} .gc-3{background:#4B5EAA;}
  .group-name { font-family:var(--serif); font-size:16px; font-style:italic; color:var(--gray-900); }
  .group-occ { font-size:11px; color:var(--gray-400); }
  .group-count { margin-left:auto; font-size:11px; color:var(--gray-400); }

  /* Gift cards */
  .gifts-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .gift-card { background:var(--white); border:1px solid var(--border); border-radius:10px; overflow:hidden; display:flex; flex-direction:column; transition:box-shadow 0.15s; position:relative; }
  .gift-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.08); }
  .gift-card.purchased { opacity:0.65; }
  .purchased-badge { position:absolute; top:8px; left:8px; background:var(--green); color:#fff; font-size:9px; font-weight:bold; letter-spacing:0.08em; text-transform:uppercase; padding:3px 8px; border-radius:10px; z-index:2; }
  .gift-img { width:100%; height:110px; background:var(--gray-50); display:flex; align-items:center; justify-content:center; border-bottom:1px solid var(--border); font-size:32px; flex-shrink:0; }
  .gift-body { padding:11px 12px; display:flex; flex-direction:column; flex:1; gap:5px; }
  .gift-name { font-size:12px; font-weight:bold; color:var(--gray-900); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.4; }
  .gift-price { font-size:13px; font-weight:bold; color:var(--green); margin-top:2px; }
  .gift-saved-on { font-size:10px; color:var(--gray-400); }
  .gift-actions { display:flex; flex-direction:column; gap:4px; margin-top:8px; }
  .ga-btn { display:flex; align-items:center; justify-content:center; gap:5px; width:100%; padding:7px; border-radius:6px; font-family:var(--sans); font-size:10px; font-weight:bold; cursor:pointer; transition:all 0.15s; border:1px solid transparent; text-decoration:none; }
  .ga-amazon { background:var(--gold); color:#fff; border-color:var(--gold); }
  .ga-amazon:hover { opacity:0.88; }
  .ga-purchased { background:var(--green-pale); color:var(--green); border-color:#C8DFD4; }
  .ga-purchased:hover { background:var(--green); color:#fff; }
  .ga-purchased.done { background:var(--green); color:#fff; }
  .ga-remove { background:var(--gray-50); color:var(--gray-400); border-color:var(--border); }
  .ga-remove:hover { background:var(--red-pale); color:var(--red); border-color:var(--red); }

  /* Empty state */
  .empty-state { display:flex; flex-direction:column; align-items:center; padding:64px 24px; text-align:center; gap:12px; }
  .empty-icon { font-size:48px; }
  .empty-title { font-family:var(--serif); font-size:22px; font-style:italic; color:var(--gray-600); }
  .empty-sub { font-size:13px; color:var(--gray-400); max-width:320px; line-height:1.6; }
  .empty-btn { margin-top:8px; padding:10px 24px; background:var(--green); color:#fff; border:none; border-radius:8px; font-family:var(--sans); font-size:13px; font-weight:bold; cursor:pointer; text-decoration:none; display:inline-block; }

  /* Mobile */
  .mob-app { display:none; flex-direction:column; height:100vh; overflow:hidden; }
  .mob-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--white); border-bottom:1px solid var(--border); flex-shrink:0; }
  .mob-brand { display:flex; align-items:center; gap:8px; }
  .mob-app-name { font-family:var(--sans); font-size:15px; font-weight:bold; color:var(--red); }
  .mob-page-label { font-family:var(--serif); font-size:15px; font-style:italic; color:var(--gray-600); }
  .mob-filter-row { display:flex; gap:5px; padding:8px 14px; background:var(--off-white); border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto; }
  .mob-scroll { flex:1; overflow-y:auto; padding:14px 14px 80px; }
  .mob-group-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; margin-top:8px; padding-bottom:6px; border-bottom:2px solid var(--border); }
  .mob-group-name { font-family:var(--serif); font-size:15px; font-style:italic; color:var(--gray-900); }
  .mob-group-count { margin-left:auto; font-size:11px; color:var(--gray-400); }
  .mob-gift-card { background:var(--white); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px; display:flex; gap:12px; position:relative; }
  .mob-gift-card.purchased { opacity:0.65; }
  .mob-purchased-badge { position:absolute; top:8px; right:8px; background:var(--green); color:#fff; font-size:9px; font-weight:bold; padding:2px 7px; border-radius:10px; }
  .mob-gift-emoji { font-size:28px; flex-shrink:0; }
  .mob-gift-info { flex:1; min-width:0; }
  .mob-gift-name { font-size:13px; font-weight:bold; color:var(--gray-900); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .mob-gift-price { font-size:13px; font-weight:bold; color:var(--green); margin-top:3px; }
  .mob-gift-actions { display:flex; gap:5px; margin-top:8px; }
  .mob-ga-btn { flex:1; padding:7px 4px; border-radius:6px; font-family:var(--sans); font-size:10px; font-weight:bold; cursor:pointer; text-align:center; border:1px solid transparent; transition:all 0.15s; text-decoration:none; display:flex; align-items:center; justify-content:center; }
  .mob-ga-amazon { background:var(--gold); color:#fff; }
  .mob-ga-purchased { background:var(--green-pale); color:var(--green); border-color:#C8DFD4; }
  .mob-ga-purchased.done { background:var(--green); color:#fff; }
  .mob-ga-remove { background:var(--gray-50); color:var(--gray-400); border-color:var(--border); }
  .bot-nav { position:fixed; bottom:0; left:0; right:0; height:62px; background:var(--white); border-top:1px solid var(--border); z-index:100; display:none; }
  .bot-nav-inner { display:flex; height:100%; }
  .bn-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--gray-400); font-size:10px; border-top:3px solid transparent; text-decoration:none; }
  .bn-sym { font-size:18px; line-height:1; }
  .bn-item.active { color:var(--green); border-top-color:var(--green); font-weight:bold; }
</style>
</head>
<body>

<!-- DESKTOP -->
<div class="desk-app" id="desk-app">
  <aside class="sidebar">
    <div class="logo"><div class="logo-wrap"><div class="gg-icon">GG</div><div><div class="logo-name">GiftGroove</div><div class="logo-tag">Smart Gift Finder</div></div></div></div>
    <nav class="nav">
      <div class="nav-sec">Main</div>
      <a class="nav-item" href="01_dashboard.html">&#9633; Dashboard</a>
      <a class="nav-item" href="02_contacts.html">&#9673; Contacts</a>
      <a class="nav-item" href="04_gift_ideas.html">&#9733; Gift Ideas</a>
      <a class="nav-item active" href="04b_saved_gifts.html">&#10022; Saved Gifts</a>
      <div class="nav-sec">Account</div>

    </nav>
    <div class="sid-foot">

<!-- MOBILE -->
<div class="mob-app" id="mob-app">
  <div class="mob-header">
    <div class="mob-brand"><div class="gg-icon-sm">GG</div><div class="mob-app-name">GiftGroove</div></div>
    <div class="mob-page-label">Saved Gifts</div>
  </div>
  <div class="mob-filter-row">
    <div class="ftab active" onclick="setFilter('all',this)">All</div>

      <a class="bn-item" href="01_dashboard.html"><span class="bn-sym">&#9633;</span>Home</a>
      <a class="bn-item" href="02_contacts.html"><span class="bn-sym">&#9673;</span>Contacts</a>
      <a class="bn-item" href="04_gift_ideas.html"><span class="bn-sym">&#9733;</span>Gifts</a>
      <a class="bn-item active" href="04b_saved_gifts.html"><span class="bn-sym">&#10022;</span>Saved</a>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://xaglxbzeexlumisozmdb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhZ2x4YnplZXhsdW1pc296bWRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzIyNDAsImV4cCI6MjA4OTQ0ODI0MH0.2Umu3Vm3-XTTnOv0_iORow0QUDCTEU2e56lAN_4j0Aw';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allGifts = [];
let contacts = {};
let currentFilter = 'all';

async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '07_login.html'; return; }
  const user = session.user;
  const name = user.user_metadata?.full_name || user.email || '';
  document.getElementById('desk-uname').textContent  = name;
  document.getElementById('desk-avatar').textContent = name.charAt(0).toUpperCase();
  await loadData(user.id);
}

async function loadData(userId) {
  // Load contacts for name lookup
  const { data: contactData } = await sb.from('contacts').select('id, first_name, last_name').eq('user_id', userId);
  (contactData || []).forEach(c => { contacts[c.id] = c.first_name + (c.last_name ? ' ' + c.last_name : ''); });

  // Load saved gifts
  const { data: gifts } = await sb.from('saved_gifts').select('*').eq('user_id', userId).order('created_at', { ascending: false });
  allGifts = gifts || [];
  renderAll();
}

function getFilteredGifts() {
  if (currentFilter === 'purchased')   return allGifts.filter(g => g.is_purchased);
  if (currentFilter === 'unpurchased') return allGifts.filter(g => !g.is_purchased);
  return allGifts;
}

function renderAll() {
  const filtered = getFilteredGifts();
  const total = filtered.length;
  const contactCount = new Set(filtered.map(g => g.contact_id)).size;
  document.getElementById('desk-total-count').textContent = total + ' gift' + (total !== 1 ? 's' : '') + ' saved across ' + contactCount + ' contact' + (contactCount !== 1 ? 's' : '');

  if (total === 0) {
    const empty = `<div class="empty-state">
      <div class="empty-icon">&#10022;</div>
      <div class="empty-title">${currentFilter === 'all' ? 'No saved gifts yet' : 'Nothing here'}</div>
      <div class="empty-sub">${currentFilter === 'all' ? 'Run a gift search and save ideas for your contacts. They\'ll appear here.' : 'No gifts matching this filter.'}</div>
      ${currentFilter === 'all' ? '<a class="empty-btn" href="04_gift_ideas.html">&#9733; Find gift ideas</a>' : ''}
    </div>`;
    document.getElementById('desk-gifts-area').innerHTML = empty;
    document.getElementById('mob-gifts-area').innerHTML  = empty;
    return;
  }

  // Group by contact
  const grouped = {};
  filtered.forEach(g => {
    if (!grouped[g.contact_id]) grouped[g.contact_id] = [];
    grouped[g.contact_id].push(g);
  });

  let deskHTML = '';
  let mobHTML  = '';
  let colorIdx = 0;

  Object.entries(grouped).forEach(([contactId, gifts]) => {
    const name = contacts[contactId] || 'Unknown contact';
    const colorCls = 'gc-' + (colorIdx % 4);
    colorIdx++;

    // Desktop group
    deskHTML += `<div class="contact-group">
      <div class="group-header">
        <div class="group-color ${colorCls}"></div>
        <div class="group-name">${escHtml(name)}</div>
        <div class="group-count">${gifts.length} gift${gifts.length !== 1 ? 's' : ''} saved</div>
      </div>
      <div class="gifts-grid">`;

    gifts.forEach(g => {
      const isPurchased = g.is_purchased;
      const savedDate = new Date(g.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric' });
      deskHTML += `<div class="gift-card ${isPurchased ? 'purchased' : ''}" id="desk-card-${g.id}">
        ${isPurchased ? '<div class="purchased-badge">Purchased</div>' : ''}
        <div class="gift-img">${g.product_emoji || '&#127873;'}</div>
        <div class="gift-body">
          <div class="gift-name">${escHtml(g.product_name)}</div>
          <div class="gift-price">${g.price ? '$' + g.price.toFixed(2) : ''}</div>
          <div class="gift-saved-on">Saved ${savedDate}</div>
          <div class="gift-actions">
            <a class="ga-btn ga-amazon" href="${escHtml(g.amazon_url || '#')}" target="giftgroove_amazon">&#9733; View on Amazon</a>
            <button class="ga-btn ga-purchased ${isPurchased ? 'done' : ''}" onclick="togglePurchased('${g.id}', this)">
              ${isPurchased ? '&#10003; Purchased' : '&#10003; Mark as purchased'}
            </button>
            <button class="ga-btn ga-remove" onclick="removeGift('${g.id}', 'desk')">&#10005; Remove</button>
          </div>
        </div>
      </div>`;
    });

    deskHTML += '</div></div>';

    // Mobile group
    mobHTML += `<div class="mob-group-header">
      <div class="group-color ${colorCls}"></div>
      <div class="mob-group-name">${escHtml(name)}</div>
      <div class="mob-group-count">${gifts.length} gift${gifts.length !== 1 ? 's' : ''}</div>
    </div>`;

    gifts.forEach(g => {
      const isPurchased = g.is_purchased;
      mobHTML += `<div class="mob-gift-card ${isPurchased ? 'purchased' : ''}" id="mob-card-${g.id}">
        ${isPurchased ? '<div class="mob-purchased-badge">Purchased</div>' : ''}
        <div class="mob-gift-emoji">${g.product_emoji || '&#127873;'}</div>
        <div class="mob-gift-info">
          <div class="mob-gift-name">${escHtml(g.product_name)}</div>
          <div class="mob-gift-price">${g.price ? '$' + g.price.toFixed(2) : ''}</div>
          <div class="mob-gift-actions">
            <a class="mob-ga-btn mob-ga-amazon" href="${escHtml(g.amazon_url || '#')}" target="giftgroove_amazon">Amazon</a>
            <button class="mob-ga-btn mob-ga-purchased ${isPurchased ? 'done' : ''}" onclick="togglePurchased('${g.id}', this)">
              ${isPurchased ? '&#10003; Done' : '&#10003; Purchased'}
            </button>
            <button class="mob-ga-btn mob-ga-remove" onclick="removeGift('${g.id}', 'mob')">&#10005;</button>
          </div>
        </div>
      </div>`;
    });
  });

  document.getElementById('desk-gifts-area').innerHTML = deskHTML;
  document.getElementById('mob-gifts-area').innerHTML  = mobHTML;
}

async function togglePurchased(id, btn) {
  const gift = allGifts.find(g => g.id === id);
  if (!gift) return;
  const nowPurchased = !gift.is_purchased;

  await sb.from('saved_gifts').update({
    is_purchased: nowPurchased,
    purchased_at: nowPurchased ? new Date().toISOString() : null
  }).eq('id', id);

  gift.is_purchased = nowPurchased;

  // Update both cards
  ['desk', 'mob'].forEach(view => {
    const card = document.getElementById(view + '-card-' + id);
    if (!card) return;
    if (nowPurchased) {
      card.classList.add('purchased');
      if (!card.querySelector('.purchased-badge, .mob-purchased-badge')) {
        const b = document.createElement('div');
        b.className = view === 'desk' ? 'purchased-badge' : 'mob-purchased-badge';
        b.textContent = 'Purchased';
        card.appendChild(b);
      }
    } else {
      card.classList.remove('purchased');
      const badge = card.querySelector('.purchased-badge, .mob-purchased-badge');
      if (badge) badge.remove();
    }
  });

  btn.textContent = nowPurchased
    ? (btn.classList.contains('mob-ga-purchased') ? '\u2713 Done' : '\u2713 Purchased')
    : (btn.classList.contains('mob-ga-purchased') ? '\u2713 Purchased' : '\u2713 Mark as purchased');
  btn.classList.toggle('done', nowPurchased);
}

async function removeGift(id, view) {
  await sb.from('saved_gifts').delete().eq('id', id);
  allGifts = allGifts.filter(g => g.id !== id);

  // Fade out
  ['desk', 'mob'].forEach(v => {
    const card = document.getElementById(v + '-card-' + id);
    if (card) { card.style.transition = 'opacity 0.3s'; card.style.opacity = '0'; setTimeout(() => { card.remove(); updateCount(); }, 300); }
  });
}

function updateCount() {
  const filtered = getFilteredGifts();
  const contactCount = new Set(filtered.map(g => g.contact_id)).size;
  document.getElementById('desk-total-count').textContent = filtered.length + ' gifts saved across ' + contactCount + ' contacts';
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

async function handleLogout() { await sb.auth.signOut(); window.location.href = '07_login.html'; }

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function checkViewport() {
  const mob = window.innerWidth < 768;
  document.getElementById('desk-app').style.display = mob ? 'none' : 'flex';
  document.getElementById('mob-app').style.display  = mob ? 'flex' : 'none';
  document.getElementById('bot-nav').style.display  = mob ? 'flex' : 'none';
}

checkViewport();
window.addEventListener('resize', checkViewport);
boot();
</script>
</body>
</html>
