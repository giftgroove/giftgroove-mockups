<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiftGroove &mdash; Log In</title>

<!-- Supabase JavaScript library - loads from CDN, no installation needed -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --white:#FFFFFF; --off-white:#F9F9F7; --gray-50:#F4F4F2; --gray-400:#9E9E96;
    --gray-600:#6B6B64; --gray-900:#1C1C1A; --red:#C0392B; --red-pale:#FDECEA;
    --green:#2D6A4F; --green-mid:#3A8B65; --green-pale:#EAF4EF; --border:#E8E8E4;
    --sans:Arial,Helvetica,sans-serif; --serif:Georgia,'Times New Roman',serif;
  }
  body { background:var(--off-white); color:var(--gray-900); font-family:var(--sans); font-size:14px; line-height:1.5; margin:0; }
  .page { display:flex; flex-direction:column; align-items:center; padding:40px 16px; background:var(--off-white); min-height:100vh; }
  .brand { display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:24px; }
  .gg-icon-auth { width:52px; height:52px; border-radius:14px; margin:0 auto 8px; background:linear-gradient(135deg,#C0392B 0%,#D4941A 100%); display:flex; align-items:center; justify-content:center; font-family:Arial,sans-serif; font-size:18px; font-weight:bold; color:#fff; letter-spacing:-1px; user-select:none; }
  .brand-name { font-family:Arial,sans-serif; font-weight:bold; color:#C0392B; font-size:22px; }
  .brand-tag { font-size:12px; color:var(--gray-400); letter-spacing:0.06em; text-transform:uppercase; }
  .card { width:100%; max-width:440px; background:var(--white); border:1px solid var(--border); border-radius:16px; padding:32px; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
  .card-title { font-family:var(--serif); font-size:22px; font-style:italic; color:var(--gray-900); margin-bottom:6px; }
  .card-sub { font-size:13px; color:var(--gray-400); margin-bottom:24px; }
  .field { display:flex; flex-direction:column; gap:5px; margin-bottom:16px; }
  .field-label { font-size:11px; font-weight:bold; letter-spacing:0.1em; text-transform:uppercase; color:var(--gray-400); }
  .f-input { padding:10px 12px; border:1px solid var(--border); border-radius:8px; background:var(--gray-50); font-family:var(--sans); font-size:13px; color:var(--gray-900); outline:none; width:100%; transition:border-color 0.15s,background 0.15s; }
  .f-input:focus { border-color:var(--green-mid); background:var(--white); }
  .f-input::placeholder { color:var(--gray-400); }
  .pw-toggle-btn { align-self:flex-start; background:none; border:none; padding:0; font-family:var(--sans); font-size:10px; color:var(--gray-400); cursor:pointer; margin-top:4px; }
  .pw-toggle-btn:hover { color:var(--green-mid); }
  .remember-row { display:flex; align-items:center; justify-content:space-between; margin-top:4px; margin-bottom:24px; }
  .remember-left { display:flex; align-items:center; gap:7px; }
  .cb-input { width:15px; height:15px; accent-color:var(--green); cursor:pointer; }
  .cb-label { font-size:12px; color:var(--gray-600); cursor:pointer; }
  .forgot-link { font-size:12px; color:var(--green); text-decoration:none; cursor:pointer; }
  .forgot-link:hover { text-decoration:underline; }
  .msg-banner { display:none; align-items:center; gap:10px; padding:11px 14px; border-radius:8px; font-size:12px; margin-bottom:16px; }
  .msg-banner.visible { display:flex; }
  .msg-banner.error { background:var(--red-pale); border:1px solid var(--red); color:var(--red); }
  .msg-banner.success { background:var(--green-pale); border:1px solid var(--green-mid); color:var(--green); }
  .submit-btn { width:100%; padding:13px; border:none; border-radius:8px; background:var(--green); color:#fff; font-family:var(--sans); font-size:14px; font-weight:bold; cursor:pointer; transition:background 0.15s; margin-bottom:20px; }
  .submit-btn:hover:not(:disabled) { background:var(--green-mid); }
  .submit-btn:disabled { opacity:0.7; cursor:not-allowed; }
  .or-divider { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .or-line { flex:1; height:1px; background:var(--border); }
  .or-text { font-size:11px; color:var(--gray-400); white-space:nowrap; }
  .social-btn { width:100%; padding:11px; border:1px solid var(--border); border-radius:8px; background:var(--white); font-family:var(--sans); font-size:13px; color:var(--gray-600); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:10px; transition:border-color 0.15s,background 0.15s; }
  .social-btn:hover { border-color:var(--gray-400); background:var(--gray-50); }
  .social-icon { font-size:15px; font-weight:bold; }
  .card-footer { text-align:center; font-size:13px; color:var(--gray-400); margin-top:4px; }
  .card-footer a { color:var(--green); text-decoration:none; font-weight:bold; }
  .card-footer a:hover { text-decoration:underline; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; margin-right:8px; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="page">

  <div class="brand">
    <div class="gg-icon-auth">GG</div>
    <div class="brand-name">GiftGroove</div>
    <div class="brand-tag">Smart Gift Finder</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Log in to your account to continue.</div>

    <!-- Error and success messages -->
    <div class="msg-banner error" id="error-banner">
      <span>&#10005;</span>
      <span id="error-text">Incorrect email or password. Please try again.</span>
    </div>
    <div class="msg-banner success" id="success-banner">
      <span>&#10003;</span>
      <span id="success-text">Logged in! Redirecting to your dashboard...</span>
    </div>

    <!-- Email -->
    <div class="field">
      <div class="field-label">Email address</div>
      <input class="f-input" type="email" id="email-input" placeholder="you@email.com" />
    </div>

    <!-- Password -->
    <div class="field" style="margin-bottom:8px;">
      <div class="field-label">Password</div>
      <input class="f-input" type="password" id="password-input" placeholder="Enter your password" />
      <button class="pw-toggle-btn" onclick="togglePw()">Show password</button>
    </div>

    <div class="remember-row">
      <div class="remember-left">
        <input type="checkbox" class="cb-input" id="cb-remember" />
        <label class="cb-label" for="cb-remember">Remember me</label>
      </div>
      <a class="forgot-link" href="08_forgot_password.html">Forgot password?</a>
    </div>

    <button class="submit-btn" id="login-btn" onclick="handleLogin()">Log in</button>

    <div class="or-divider">
      <div class="or-line"></div>
      <div class="or-text">or continue with</div>
      <div class="or-line"></div>
    </div>

    <button class="social-btn" onclick="handleGoogleLogin()">
      <span class="social-icon">G</span> Continue with Google
    </button>

    <div class="card-footer">
      Don't have an account? <a href="06_signup.html">Sign up free</a>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────
// SUPABASE CONNECTION
// These two values connect this page to your database.
// Do not share your service_role key - the anon key here is safe.
// ─────────────────────────────────────────────────────────
const SUPABASE_URL     = 'https://xaglxbzeexlumisozmdb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhZ2x4YnplZXhsdW1pc296bWRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzIyNDAsImV4cCI6MjA4OTQ0ODI0MH0.2Umu3Vm3-XTTnOv0_iORow0QUDCTEU2e56lAN_4j0Aw';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─────────────────────────────────────────────────────────
// AUTO-REDIRECT: If already logged in, skip to dashboard
// ─────────────────────────────────────────────────────────
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) {
    window.location.href = '01_dashboard.html';
  }
});

// ─────────────────────────────────────────────────────────
// EMAIL / PASSWORD LOGIN
// ─────────────────────────────────────────────────────────
async function handleLogin() {
  const email    = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;
  const btn      = document.getElementById('login-btn');

  // Check fields are filled
  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  // Show loading spinner in button
  btn.disabled    = true;
  btn.innerHTML   = '<span class="spinner"></span>Logging in...';
  hideMessages();

  // Send login request to Supabase
  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    // Login failed - reset button and show friendly error
    btn.disabled  = false;
    btn.innerHTML = 'Log in';
    showError(getFriendlyError(error.message));
    return;
  }

  // Login succeeded - show confirmation and redirect
  showSuccess('Logged in! Taking you to your dashboard...');
  setTimeout(() => { window.location.href = '01_dashboard.html'; }, 1000);
}

// ─────────────────────────────────────────────────────────
// GOOGLE LOGIN
// Supabase handles the redirect to Google and back automatically
// ─────────────────────────────────────────────────────────
async function handleGoogleLogin() {
  hideMessages();

  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      // After Google login, send user back to dashboard
      redirectTo: window.location.origin + '/01_dashboard.html'
    }
  });

  if (error) {
    showError('Could not connect to Google. Please try again.');
  }
  // If successful, Supabase redirects automatically - no further code needed
}

// ─────────────────────────────────────────────────────────
// PRESS ENTER TO SUBMIT
// ─────────────────────────────────────────────────────────
document.getElementById('email-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('password-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});

// ─────────────────────────────────────────────────────────
// HELPER FUNCTIONS
// ─────────────────────────────────────────────────────────
function togglePw() {
  const input = document.getElementById('password-input');
  const btn   = document.querySelector('.pw-toggle-btn');
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  btn.textContent = show ? 'Hide password' : 'Show password';
}

function showError(msg) {
  document.getElementById('error-text').textContent = msg;
  document.getElementById('error-banner').classList.add('visible');
  document.getElementById('success-banner').classList.remove('visible');
}

function showSuccess(msg) {
  document.getElementById('success-text').textContent = msg;
  document.getElementById('success-banner').classList.add('visible');
  document.getElementById('error-banner').classList.remove('visible');
}

function hideMessages() {
  document.getElementById('error-banner').classList.remove('visible');
  document.getElementById('success-banner').classList.remove('visible');
}

function getFriendlyError(msg) {
  // Converts Supabase technical error messages into plain English
  if (msg.includes('Invalid login credentials')) return 'Incorrect email or password. Please try again.';
  if (msg.includes('Email not confirmed'))        return 'Please check your email and click the confirmation link before logging in.';
  if (msg.includes('Too many requests'))          return 'Too many attempts. Please wait a minute and try again.';
  if (msg.includes('User not found'))             return 'No account found with that email. Would you like to sign up?';
  return 'Something went wrong. Please try again.';
}
</script>

</body>
</html>
